services:
  fitness-tracker:
    build:
      context: .
      target: production
    container_name: fitness-tracker
    restart: unless-stopped
    environment:
      - PORT=8787
      - DB_PATH=/data/fitness.db
    expose:
      - "8787"
    volumes:
      - fitness-tracker-data:/data
    networks:
      - web

  caddy:
    image: caddy:2
    container_name: fitness-caddy
    restart: unless-stopped
    depends_on:
      - fitness-tracker
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

volumes:
  fitness-tracker-data:
  caddy_data:
  caddy_config:

networks:
  web:
