services:
  fitness-tracker:
    build:
      context: .
      target: production
    container_name: fitness-tracker
    restart: unless-stopped
    environment:
      - PORT=8788
      - DB_PATH=/data/fitness.db
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-8788}:8788"
    volumes:
      - fitness-tracker-data:/data

volumes:
  fitness-tracker-data:
